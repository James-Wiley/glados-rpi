name: Build ROS2 (Pi Zero 2 W)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Enable ARM emulation
        uses: docker/setup-qemu-action@v3

      - name: Build ROS2 workspace
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/ws \
            ros:humble \
            bash -c "
              apt update &&
              apt install -y python3-colcon-common-extensions python3-rosdep &&
              rosdep init || true &&
              rosdep update &&
              cd /ws &&
              rosdep install --from-paths src --ignore-src -y &&
              colcon build --cmake-args -DBUILD_TESTING=OFF
            "

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: ros2-install
          path: install/